<!doctype html>
    <html lang="de" data-theme="dark">

    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
      <meta name="theme-color" content="#0b1220">
      <meta name="color-scheme" content="dark">
      <title>Merger</title>
      <link rel="manifest" href="../../../manifest.webmanifest">
      <link rel="icon" type="image/png" sizes="32x32" href="../../../icon-192.png">
      <link rel="apple-touch-icon" sizes="192x192" href="../../../icon-192.png">
      <link rel="stylesheet" href="./app.css">
    </head>

    <body>
      <main class="app">
        <section class="card">
          <div id="dropZone" class="drop" tabindex="0" role="button" aria-label="PDF auswählen">
            <div class="drop-content">
              <div id="dropHint">
                <strong>PDF hierhin ziehen</strong>
                <div>oder klicken zum Auswählen</div>
              </div>
              <div id="inputFileList" class="file-list"></div>
            </div>
          </div>
        </section>

        <div class="cards-layout">
          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Mehrere PDF-Seiten auf ein Blatt</h2>
            </div>
            <div id="selectedFileNameLine" class="card-subtitle current-file-name">Keine Datei ausgewählt</div>
            <div class="grid">
              <section id="optionsPanel" class="options-panel options-disabled" aria-disabled="true">
                <h2 class="section-title">Seiten pro Blatt</h2>
                <div class="pages" id="pagesButtons">
                  <button type="button" data-pages="2" class="stack-2 active" aria-pressed="true">
                    <div class="page-option">
                      <div class="mini-sheet"><span>1</span><span>2</span></div>
                    </div>
                  </button>
                  <button id="specialThreeModeButton" class="special-toggle" type="button" aria-pressed="false"
                    aria-label="Spezialmodus 3 Seiten" title="Nur bei 3-seitiger PDF verfügbar">
                    <div class="special-icon" aria-hidden="true">
                      <div class="special-sheet"><span>1</span><span>1</span></div>
                      <div class="special-sheet"><span>2</span><span>3</span></div>
                    </div>
                  </button>
                  <button type="button" data-pages="4" class="stack-4" aria-pressed="false">
                    <div class="page-option">
                      <div class="mini-sheet"><span>1</span><span>2</span><span>3</span><span>4</span></div>
                    </div>
                  </button>
                  <button type="button" data-pages="6" class="stack-6" aria-pressed="false">
                    <div class="page-option">
                      <div class="mini-sheet">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>
                      </div>
                    </div>
                  </button>
                  <button type="button" data-pages="8" class="stack-8" aria-pressed="false">
                    <div class="page-option">
                      <div class="mini-sheet">
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                      </div>
                    </div>
                  </button>
                </div>

                <div class="setting-group">
                  <label class="auto-orientation-choice"><input id="autoOrientationToggle" type="checkbox" checked>
                    Ausrichtung (hoch vs. quer) automatisch optimieren</label>
                </div>

                <div class="setting-group">
                  <label class="section-title" for="studentCount">Anzahl Lernende (optional)</label>
                  <input id="studentCount" type="number" min="1" step="1" placeholder="">
                </div>

                <div class="setting-group">
                  <div class="section-title">Offene Plätze von Restseiten</div>
                  <div class="padding-choice" role="radiogroup" aria-label="Bei Restseiten">
                    <label><input type="radio" name="paddingMode" value="blank" checked> leer lassen</label>
                    <label><input type="radio" name="paddingMode" value="auto"> mit vorhandenen Seiten auffüllen</label>
                    <label><input type="radio" name="paddingMode" value="lcm"> mit vorhandenen Seiten auffüllen (bis
                      Kopien für Lernendenanzahl erreicht)</label>
                  </div>
                </div>
              </section>
            </div>

            <div class="controls">
              <button id="startButton" class="start" type="button">Start</button>
            </div>
          </section>

          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Mehrere PDFs in eine Datei</h2>
            </div>
            <div class="append-content">
              <div class="section-title append-list-title">Dateiliste <span id="appendTotalPages"
                  class="hint">(Gesamtseitenanzahl: 0)</span></div>
              <div id="appendFileList" class="file-list"></div>
            </div>
            <div class="controls">
              <button id="appendStartButton" class="start" type="button">Start</button>
            </div>
          </section>
        </div>
        <input id="sharedPdfInput" class="hidden" type="file" accept="application/pdf,.pdf" multiple>
      </main>
      <dialog id="resultDialog" class="settings-dialog result-dialog hidden" aria-labelledby="resultTitle"
        aria-describedby="resultMessage">
        <p id="resultTitle" class="settings-title">Hinweis</p>
        <p id="resultMessage" class="result-message"></p>
        <div class="update-actions">
          <button id="resultOpenButton" class="btn-small hidden" type="button">Öffnen</button>
          <button id="resultCloseButton" class="btn-small primary" type="button">OK</button>
        </div>
      </dialog>
      <dialog id="busyDialog" class="settings-dialog busy-dialog hidden" aria-labelledby="busyTitle"
        aria-describedby="busyMessage">
        <p id="busyTitle" class="settings-title">Bitte warten</p>
        <p id="busyMessage" class="busy-message">PDF-Engine wird geladen ...</p>
      </dialog>

      <script src="./app.js"></script>
    </body>

    </html>
